<script>
//////////////////////////////////////////////////
// 🔒 收费系统
//////////////////////////////////////////////////

// ===== 固定用户ID（防止变化）=====
function getUserId() {
  let id = localStorage.getItem("user_id");
  if (!id) {
    id = "u_" + Math.random().toString(36).slice(2);
    localStorage.setItem("user_id", id);
  }
  return id;
}

function getUser() {
  return {
    usage: JSON.parse(localStorage.getItem("usage") || "{}"),
    pdfPaid: localStorage.getItem("pdf_paid") === "true",
    execExpire: Number(localStorage.getItem("exec_expire") || 0),
    proExpire: Number(localStorage.getItem("pro_expire") || 0),

    // ✅ 新增
    credits: Number(localStorage.getItem("credits") || 0)
  };
}

function isPro() {
  return Date.now() < getUser().proExpire;
}

function isExecutive() {
  return Date.now() < getUser().execExpire;
}

function activateExecutive(days) {
  const expire = Date.now() + days * 24 * 60 * 60 * 1000;
  localStorage.setItem("exec_expire", expire);

  alert("🚀 Executive 已开通！");
  updateUsageUI();
}

function activatePro(days) {
  const expire = Date.now() + days * 24 * 60 * 60 * 1000;
  localStorage.setItem("pro_expire", expire);

  alert("💎 Pro 已开通！");
  updateUsageUI();
}

function getRemainingDays(expire) {
  if (!expire) return 0;

  const diff = expire - Date.now();

  if (diff <= 0) return 0;

  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function getUserPlan() {
  const user = getUser();

  if (Date.now() < user.proExpire) {
    return {
      type: "pro",
      days: getRemainingDays(user.proExpire)
    };
  }

  if (Date.now() < user.execExpire) {
    return {
      type: "exec",
      days: getRemainingDays(user.execExpire)
    };
  }

  return {
    type: "free",
    days: 0
  };
}

function getRemainingCount() {

  const plan = getUserPlan();

  // ===== Pro / Exec 都是无限 =====
  if (plan.type !== "free") {
    return "∞";
  }

  const user = getUser();

  // ===== 免费次数 =====
  const today = new Date().toDateString();
  let usage = JSON.parse(localStorage.getItem("usage") || "{}");

  let freeLeft = 2;

  if (usage.date === today) {
    freeLeft = Math.max(0, 2 - (usage.count || 0));
  }

  const credits = user.credits || 0;

  return freeLeft + credits;
}

function updateUsageUI() {

  const el = document.getElementById("usageText");
  if (!el) return;

  const plan = getUserPlan();

  if (plan.type === "pro") {
    el.innerText = `💎 Pro会员：无限使用（剩余 ${plan.days} 天）`;
    return;
  }

  if (plan.type === "exec") {
    el.innerText = `🚀 Executive：无限使用（剩余 ${plan.days} 天）`;
    return;
  }

  el.innerText = "剩余次数：" + getRemainingCount();
}

document.addEventListener("DOMContentLoaded", () => {
  updateUsageUI();
});

function canDownloadPDF() {
  return isPro() || isExecutive() || getUser().pdfPaid;

function checkUsage() {
  return true;

btn.onclick = async () => {

  isProcessing = true;

  try {

    // ===== 1. 检查图片 =====
    if (!currentFile) {
      alert("请选择图片");
      return;

    // ===== 2. usage检查（后端）=====

    try {
      const usageRes = await fetch("/api/usage", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId: getUserId() })
      });

    const today = new Date().toDateString();

    let usage = JSON.parse(localStorage.getItem("usage") || "{}");
    if (usage.date !== today) {
      usage = { date: today, count: 0 };
    }

    const user = getUser();

    if (!isPro()) {

      if (user.credits > 0) {
        // 👉 用次数包
        localStorage.setItem("credits", user.credits - 1);

      } else {

        // 👉 免费次数

          showUpgradeModal();
          return;
        }

        usage.count++;
        localStorage.setItem("usage", JSON.stringify(usage));
      }
    }

    // ===== UI loading =====

    resultDiv.innerHTML = `
      <div class="loading-box">
        <div class="spinner"></div>
        <div class="loading-title">AI 正在识别中</div>
        <div class="loading-sub" id="loadingText">准备中...</div>
        <div class="loading-progress">

        </div>

    `;

    setTimeout(() => startLoadingAnimation(), 50);

    // ===== 压缩图片 =====
    const base64 = await compress(currentFile);

    // ===== 识别 =====
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        imageBase64: base64.split(",")[1],
        mediaType: "image/jpeg"
      })
    });

    const text = await res.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      throw new Error("API返回不是JSON");
    }

    if (!data.success) throw new Error(data.error);

    stopLoadingAnimation();

    // ===== 记录使用 =====
    try {
      await fetch("/api/increment", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId: getUserId() })
      });
    } catch {}

    render(data.data);

  } catch (err) {

    console.error(err);
    stopLoadingAnimation();
    resultDiv.innerHTML = `<div class="card">❌ ${err.message}</div>`;

  } finally {

    btn.disabled = false;
    isProcessing = false;
  }
};

//////////////////////////////////////////////////
// 📦 图片压缩
//////////////////////////////////////////////////

function compress(file) {
  return new Promise((resolve, reject) => {

    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => {
      img.src = e.target.result;
    };

    img.onload = () => {
      const canvas = document.createElement("canvas");

      const scale = Math.min(1, 800 / img.width);

      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      resolve(canvas.toDataURL("image/jpeg", 0.7));
    };

    img.onerror = () => {
      reject(new Error("图片格式不支持（建议用JPG）"));
    };

    reader.onerror = () => {
      reject(new Error("读取图片失败"));
    };

    reader.readAsDataURL(file);
  });
}

//////////////////////////////////////////////////
// 📄 PDF（唯一正确版本）
//////////////////////////////////////////////////

async function generatePDF() {

  const report = document.getElementById("report");

  if (!report) {
    alert("报告不存在");
    return;
  }

  try {

    // ===== 1️⃣ 用 html2canvas 转成图片 =====
    const canvas = await html2canvas(report, {
      scale: 2,
      useCORS: true,
      scrollY: -(window.scrollY || 0)
    });

    const imgData = canvas.toDataURL("image/jpeg", 0.95);

    // ===== 2️⃣ 创建PDF =====
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const pageWidth = 210;
    const pageHeight = 297;

    // 图片尺寸换算
    const imgWidth = pageWidth;
    const imgHeight = canvas.height * pageWidth / canvas.width;

    let heightLeft = imgHeight;
    let position = 0;

    // ===== 3️⃣ 第一页 =====
    pdf.addImage(imgData, "JPEG", 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    // ===== 4️⃣ 自动分页 =====
    while (heightLeft > 0) {
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, "JPEG", 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    // ===== 5️⃣ 下载 =====
    pdf.save("DRTE-中药检测报告.pdf");

  } catch (err) {
    console.error("PDF失败:", err);
    alert("PDF生成失败");
  }
} 

function downloadPDF() {

  if (!window.latestData) {
    alert("请先识别");
    return;
  }

  // 👉 直接调用生成
  generatePDF();
}

//////////////////////////////////////////////////
// 🚀 高级 Loading 动画
//////////////////////////////////////////////////

let loadingTimer = null;

function startLoadingAnimation() {

  const steps = [
    { id: "s1", text: "图片上传中..." },
    { id: "s2", text: "AI识别中..." },
    { id: "s3", text: "分析特征..." },
    { id: "s4", text: "评估质量..." },
    { id: "s5", text: "生成报告..." }
  ];

  let progress = 0;
  let currentStep = 0;

  loadingTimer = setInterval(() => {

    const bar = document.getElementById("loadingBar");
    const text = document.getElementById("loadingText");

    // ❗关键防护：DOM还没渲染就跳过
    if (!bar || !text) return;

    // 👉 进度增长
    if (progress < 90) {
      progress += (100 - progress) * 0.08;
      bar.style.width = progress + "%";
    }

    // 👉 步骤推进
    if (currentStep < steps.length) {

      const stepEl = document.getElementById(steps[currentStep].id);

      if (stepEl) {
        stepEl.classList.add("active");
        text.innerText = steps[currentStep].text;

        setTimeout(() => {
          stepEl.classList.remove("active");
          stepEl.classList.add("done");
          stepEl.innerText = "✔ " + stepEl.innerText;
        }, 500);
      }

      currentStep++;
    }

  }, 900);
}

function stopLoadingAnimation() {
  clearInterval(loadingTimer);

  const bar = document.getElementById("loadingBar");
  if (bar) bar.style.width = "100%";

  // 👉 平滑结束（关键高级感）
  setTimeout(() => {
    const box = document.querySelector(".loading-box");
    if (box) {
      box.style.transition = "opacity 0.4s";
      box.style.opacity = "0";
    }
  }, 300);
}

</script>
