<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>DRTE HerbAI</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: linear-gradient(135deg, #0f172a, #0f766e);
  color: #111;
}

/* 主卡片 */
.app {
  max-width: 860px;
  margin: 40px auto;
  background: #fff;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

/* 顶部 */
.header {
  background: #0f766e;
  color: white;
  padding: 20px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo svg {
  background: white;
  border-radius: 50%;
}

.brand-title {
  font-size: 20px;
  font-weight: bold;
}

.brand-sub {
  font-size: 12px;
  opacity: 0.8;
}

/* 内容 */
.content {
  padding: 24px;
}

/* 上传 */
.upload {
  border: 2px dashed #0f766e;
  border-radius: 12px;
  padding: 30px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.upload:hover {
  background: #f0fdfa;
}

/* 按钮 */
button {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  background: #0f766e;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  background: #0d5f5a;
}

/* 状态 */
.status {
  margin-top: 10px;
  font-size: 13px;
  color: #666;
}

/* 报告 */
.report {
  margin-top: 25px;
  border-top: 1px solid #eee;
  padding-top: 20px;
}

.report-title {
  font-size: 18px;
  font-weight: bold;
}

/* 数据卡片 */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 15px;
}

.card {
  background: #f9fafb;
  padding: 14px;
  border-radius: 10px;
}

.card strong {
  display: block;
  font-size: 12px;
  color: #888;
}

/* 高亮 */
.highlight {
  font-size: 18px;
  font-weight: bold;
  color: #0f766e;
}

/* 底部 */
.footer {
  text-align: center;
  padding: 16px;
  font-size: 12px;
  color: #999;
  border-top: 1px solid #eee;
}
</style>
</head>

<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg width="36" height="36" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="#0f766e"/>
        <text x="50" y="60" text-anchor="middle" font-size="40" fill="white">D</text>
      </svg>
      <div>
        <div class="brand-title">DRTE HerbAI™</div>
        <div class="brand-sub">AI 中药智能识别系统</div>
      </div>
    </div>
  </div>

  <!-- 内容 -->
  <div class="content">

    <!-- 上传 -->
    <input type="file" id="file" hidden>

    <div class="upload" onclick="file.click()">
      📷 点击上传中药图片
    </div>

    <button onclick="analyze()">开始检测</button>

    <div class="status" id="status"></div>

    <!-- 报告 -->
    <div class="report" id="report" style="display:none">

      <div class="report-title">检测报告</div>

      <div class="grid">

        <div class="card">
          <strong>药材名称</strong>
          <div class="highlight" id="name"></div>
        </div>

        <div class="card">
          <strong>置信度</strong>
          <div class="highlight" id="confidence"></div>
        </div>

        <div class="card">
          <strong>特征描述</strong>
          <div id="features"></div>
        </div>

        <div class="card">
          <strong>质量评估</strong>
          <div id="quality"></div>
        </div>

      </div>

      <div class="card" style="margin-top:15px;">
        <strong>报告信息</strong>
        编号：<span id="reportId"></span><br>
        时间：<span id="date"></span>
      </div>

      <button onclick="downloadPDF()">下载PDF报告</button>

    </div>

  </div>

  <div class="footer">
    © 2026 DRTE HerbAI™ · All Rights Reserved
  </div>

</div>

<script>
function generateReportId(){
  return "DRTE-" + Date.now();
}

async function analyze(){

  document.getElementById("status").innerText = "识别中，请稍候...";

  // 👉 模拟API（替换成你的真实接口）
  const result = {
    name: "人参",
    confidence: 96,
    features: "根条粗壮，质地坚实",
    quality: "优质"
  };

  document.getElementById("name").innerText = result.name;
  document.getElementById("confidence").innerText = result.confidence + "%";
  document.getElementById("features").innerText = result.features;
  document.getElementById("quality").innerText = result.quality;

  document.getElementById("reportId").innerText = generateReportId();
  document.getElementById("date").innerText = new Date().toLocaleString();

  document.getElementById("report").style.display = "block";
  document.getElementById("status").innerText = "检测完成 ✅";
}

async function downloadPDF(){

  const element = document.getElementById("report");

  const canvas = await html2canvas(element, {scale:2});
  const img = canvas.toDataURL("image/png");

  const pdf = new jspdf.jsPDF();
  pdf.addImage(img, "PNG", 10, 10, 190, 0);

  pdf.save("DRTE-Report.pdf");
}
</script>

</body>
</html>
