<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DRTE HerbAI™</title>

<style>
body { font-family: Arial; text-align: center; padding: 20px; }
button { padding: 10px 20px; font-size: 16px; }
button:disabled { background: #aaa; }
img { max-width: 300px; margin-top: 10px; }
</style>
</head>

<body>

<h1>DRTE HerbAI™</h1>
<h2>📸 AI 中药识别</h2>

<input type="file" id="file" accept="image/*"><br><br>

<button id="btn">开始识别</button>

<div id="usageText"></div>
<div id="preview"></div>
<pre id="result"></pre>

<script>
//////////////////////////////////////////////////
// ✅ 用户状态（唯一来源）
//////////////////////////////////////////////////

const UserStore = {
  state: { isPro: false, remaining: 0, allowed: true, credits: 0 },

  async init() {
    try {
      const token = localStorage.getItem("token");

      const res = await fetch("/api/user", {
        headers: {
          Authorization: "Bearer " + token
        }
      });

      const data = await res.json();

      this.state = {
        isPro: data?.isPro ?? false,
        remaining: data?.remaining ?? 0,
        allowed: data?.allowed ?? true,
        credits: data?.credits ?? 0
      };

    } catch {
      this.state = { isPro: false, remaining: 0, allowed: true, credits: 0 };
    }

    updateUI();
  }
};

//////////////////////////////////////////////////
// ✅ UI 更新（稳定）
//////////////////////////////////////////////////

function updateUI() {
  const u = UserStore.state;

  const box = document.getElementById("usageText");
  if (box) {
    box.innerText = u.isPro
      ? "👑 Pro会员（无限使用）"
      : `⚡ 剩余 ${u.remaining} 次`;
  }

  const btn = document.getElementById("btn");
  if (btn) {
    btn.disabled = !u.allowed && !u.isPro;
  }
}

//////////////////////////////////////////////////
// ✅ 用户ID（用于 usage）
//////////////////////////////////////////////////

function getUserId() {
  let id = localStorage.getItem("user_id");
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("user_id", id);
  }
  return id;
}

//////////////////////////////////////////////////
// ✅ 文件选择
//////////////////////////////////////////////////

let currentFile = null;

document.getElementById("file").addEventListener("change", (e) => {
  currentFile = e.target.files[0];

  if (currentFile) {
    document.getElementById("preview").innerHTML =
      `<img src="${URL.createObjectURL(currentFile)}">`;
  }
});

//////////////////////////////////////////////////
// ✅ 点击识别（完整正确流程）
//////////////////////////////////////////////////

document.getElementById("btn").addEventListener("click", async () => {

  // 🔥 第3步：点击前限制（核心）
  const user = UserStore.state;

  if (!user.isPro && user.remaining <= 0) {
    alert("今日次数已用完，请升级Pro");
    return;
  }

  if (!currentFile) {
    alert("请选择图片");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function () {
    try {
      const base64 = reader.result.split(",")[1];

      const res = await fetch("/api/analyze", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          imageBase64: base64,
          mediaType: currentFile.type
        })
      });

      const data = await res.json();

      // 🔥 第2步：扣次数（核心）
      await fetch("/api/increment", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          userId: getUserId()
        })
      });

      document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);

      // 🔥 刷新用户状态
      await UserStore.init();

    } catch (err) {
      console.error(err);
      alert("识别失败");
    }
  };

  reader.readAsDataURL(currentFile);
});

//////////////////////////////////////////////////
// ✅ 初始化
//////////////////////////////////////////////////

document.addEventListener("DOMContentLoaded", () => {
  UserStore.init();
});
</script>

</body>
</html>
