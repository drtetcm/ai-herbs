<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DRTE HerbAI™</title>

<link rel="icon" type="image/png" href="https://d1yei2z3i6k35z.cloudfront.net/thumb_150/699aeed15c77a_DRTE_favicon.png" />

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
  margin: 0;
  background: #f5f6f8;
}
.container {
  max-width: 720px;
  margin: auto;
  padding: 16px;
  text-align: center;
}
button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #007bff;
  color: #fff;
}
button:disabled { background: #aaa; }
img { max-width: 400px; border-radius: 10px; }
.footer {
  background: #0f172a;
  color: #cbd5f5;
  margin-top: 40px;
  padding: 30px 15px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h1>DRTE HerbAI™</h1>
  <h2>📸 AI 中药智能识别系统</h2>

  <input type="file" id="file" accept="image/*" />
  <br><br>

  <button id="btn">开始识别</button>
  <div id="usageText"></div>

  <div id="preview"></div>
  <div id="result"></div>
</div>

<script>
//////////////////////////////////////////////////
// ✅ 单一用户状态源（唯一真相）
//////////////////////////////////////////////////

const UserStore = {
  state: {
    isPro: false,
    remaining: 0,
    allowed: true,
    credits: 0
  },

  async init() {
    try {
      const res = await fetch("/api/user");
      const data = await res.json();

      this.state = {
        isPro: data?.isPro ?? false,
        remaining: data?.remaining ?? 0,
        allowed: data?.allowed ?? true,
        credits: data?.credits ?? 0
      };
    } catch {
      this.state = { isPro: false, remaining: 0, allowed: true, credits: 0 };
    }

    UI.render(this.state);
  }
};

//////////////////////////////////////////////////
// ✅ UI 层（只负责显示）
//////////////////////////////////////////////////

const UI = {
  usageEl: null,
  btn: null,
  preview: null,
  result: null,

  init() {
    this.usageEl = document.getElementById("usageText");
    this.btn = document.getElementById("btn");
    this.preview = document.getElementById("preview");
    this.result = document.getElementById("result");
  },

  render(user) {
    if (this.usageEl) {
      this.usageEl.innerText = user.isPro
        ? "👑 Pro会员（无限使用）"
        : `⚡ 剩余 ${user.remaining} 次`;
    }

    if (this.btn) {
      this.btn.disabled = !user.allowed && !user.isPro;
      this.btn.innerText = user.isPro ? "🚀 无限识别" : "开始识别";
    }
  }
};

//////////////////////////////////////////////////
// ✅ 业务逻辑（唯一入口）
//////////////////////////////////////////////////

const App = {
  file: null,
  processing: false,

  init() {
    UI.init();

    const fileInput = document.getElementById("file");
    const btn = document.getElementById("btn");

    if (fileInput) {
      fileInput.addEventListener("change", (e) => {
        this.file = e.target.files[0];
        if (this.file && UI.preview) {
          UI.preview.innerHTML =
            `<img src="${URL.createObjectURL(this.file)}">`;
        }
      });
    }

    if (btn) {
      btn.addEventListener("click", () => this.handleClick());
    }

    UserStore.init();
  },

  async handleClick() {
    if (this.processing) return;
    this.processing = true;

    try {
      if (!this.file) {
        alert("请选择图片");
        return;
      }

      const user = UserStore.state;

      if (!user.allowed && !user.isPro && user.credits <= 0) {
        alert("次数已用完");
        return;
      }

      UI.btn.disabled = true;

      const form = new FormData();
      form.append("file", this.file);

      const res = await fetch("/api/analyze", {
        method: "POST",
        body: form
      });

      const data = await res.json();

      if (UI.result) {
        UI.result.innerText = JSON.stringify(data, null, 2);
      }

      await UserStore.init();

    } catch (e) {
      console.error(e);
      alert("识别失败");
    } finally {
      this.processing = false;
      UI.render(UserStore.state);
    }
  }
};

//////////////////////////////////////////////////
// ✅ 启动（唯一入口）
//////////////////////////////////////////////////

document.addEventListener("DOMContentLoaded", () => {
  App.init();
});
</script>

<footer class="footer">
  DRTE HerbAI™ · AI 中药识别
</footer>

</body>
</html>
