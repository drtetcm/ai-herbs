<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DRTE HerbAI™</title>

<link rel="icon" type="image/png" href="https://d1yei2z3i6k35z.cloudfront.net/thumb_150/699aeed15c77a_DRTE_favicon.png" />

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
  margin: 0;
  background: #f5f6f8;
}
.container {
  max-width: 720px;
  margin: auto;
  padding: 16px;
  text-align: center;
}
button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #007bff;
  color: #fff;
}
button:disabled { background: #aaa; }
img { max-width: 400px; border-radius: 10px; }
.footer {
  background: #0f172a;
  color: #cbd5f5;
  margin-top: 40px;
  padding: 30px 15px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h1>DRTE HerbAI™</h1>
  <h2>📸 AI 中药智能识别系统</h2>

  <input type="file" id="file" accept="image/*" />
  <br><br>

  <button id="btn">开始识别</button>
  <div id="usageText"></div>

  <div id="preview"></div>
  <div id="result"></div>
</div>

<script>
// ── 唯一用户状态 ──────────────────────────────
const UserStore = {
  data: { isPro: false, remaining: 0, allowed: true },

  async init() {
    try {
      const res = await fetch("/api/user");
      if (!res.ok) throw new Error("user api fail");
      const d = await res.json();
      this.data = {
        isPro:     !!d?.isPro,
        remaining: d?.remaining ?? 0,
        allowed:   d?.allowed  ?? true
      };
    } catch {
      // 网络失败时保持上次数据，不重置
    }
    updateUI();
  }
};

// ── UI 更新 ───────────────────────────────────
function updateUI() {
  const { isPro, remaining, allowed } = UserStore.data;

  const box = document.getElementById("usageText");
  if (box) {
    box.textContent = isPro
      ? "👑 Pro 会员（无限次）"
      : `⚡ 今日剩余 ${remaining} 次`;
  }

  const btn = document.getElementById("btn");
  if (btn) {
    const canUse = isPro || allowed;
    btn.disabled  = !canUse;
    btn.textContent = isPro ? "🚀 识别（Pro 无限）" : "开始识别";
  }
}

// ── 图片预览 ──────────────────────────────────
let currentFile = null;
let isProcessing = false;

document.getElementById("file").addEventListener("change", (e) => {
  currentFile = e.target.files?.[0] ?? null;
  const preview = document.getElementById("preview");
  if (preview) {
    preview.innerHTML = currentFile
      ? `<img src="${URL.createObjectURL(currentFile)}" alt="预览图">`
      : "";
  }
});

// ── 识别主逻辑 ────────────────────────────────
document.getElementById("btn").addEventListener("click", async () => {
  if (isProcessing) return;

  if (!currentFile) {
    alert("请先选择图片");
    return;
  }

  const btn    = document.getElementById("btn");
  const result = document.getElementById("result");

  isProcessing = true;
  if (btn) { btn.disabled = true; btn.textContent = "识别中…"; }
  if (result) result.textContent = "";

  try {
    const form = new FormData();
    form.append("image", currentFile);

    const res = await fetch("/api/analyze", { method: "POST", body: form });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    if (result) {
      // 根据实际 API 返回字段调整，这里优先显示 data.result 文本
      result.textContent = data?.result ?? JSON.stringify(data, null, 2);
    }

    // 刷新用量（不阻塞 UI）
    UserStore.init();

  } catch (e) {
    console.error("识别失败:", e);
    alert("识别失败，请稍后重试");
  } finally {
    isProcessing = false;
    updateUI(); // 恢复按钮状态
  }
});

// ── 初始化 ────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => UserStore.init());
</script>

<footer class="footer">
  DRTE HerbAI™ · AI 中药识别
</footer>

</body>
</html>
