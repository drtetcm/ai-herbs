<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DRTE HerbAI™</title>

<link rel="icon" type="image/png" href="https://d1yei2z3i6k35z.cloudfront.net/thumb_150/699aeed15c77a_DRTE_favicon.png" />

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
  margin: 0;
  background: #f5f6f8;
}
.container {
  max-width: 720px;
  margin: auto;
  padding: 16px;
  text-align: center;
}
button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #007bff;
  color: #fff;
}
button:disabled { background: #aaa; }
img { max-width: 400px; border-radius: 10px; }
.footer {
  background: #0f172a;
  color: #cbd5f5;
  margin-top: 40px;
  padding: 30px 15px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h1>DRTE HerbAI™</h1>
  <h2>📸 AI 中药智能识别系统</h2>

  <input type="file" id="file" accept="image/*" />
  <br><br>

  <button id="btn">开始识别</button>
  <div id="usageText"></div>

  <div id="preview"></div>
  <div id="result"></div>
</div>

<script>

//////////////////////////////////////////////////
// ✅ 唯一用户状态（核心修复）
//////////////////////////////////////////////////

const UserStore = {
  data: { isPro: false, remaining: 0, allowed: true, credits: 0 },

  async init() {
    try {
      const token = localStorage.getItem("token");

const res = await fetch("/api/user", {
  headers: {
    Authorization: "Bearer " + token
  }
});
      const data = await res.json();

      this.data = {
        isPro: data?.isPro ?? false,
        remaining: data?.remaining ?? 0,
        allowed: data?.allowed ?? true,
        credits: data?.credits ?? 0
      };

    } catch {
      this.data = { isPro: false, remaining: 0, allowed: true, credits: 0 };
    }

    updateUI();
  }
};

//////////////////////////////////////////////////
// ✅ UI（稳定）
//////////////////////////////////////////////////

function updateUI() {
  const u = UserStore.data;
  const box = document.getElementById("usageText");
  const btn = document.getElementById("btn");

  if (box) {
    box.innerText = u.isPro
      ? "👑 Pro会员（无限）"
      : `⚡ 剩余 ${u.remaining} 次`;
  }

  if (btn) {
    btn.disabled = !u.allowed && !u.isPro;
    btn.innerText = u.isPro ? "🚀 无限识别" : "开始识别";
  }
}

//////////////////////////////////////////////////
// ✅ 识别逻辑（修复稳定）
//////////////////////////////////////////////////

let currentFile = null;
let isProcessing = false;

document.getElementById("file").addEventListener("change", (e) => {
  currentFile = e.target.files[0];
  if (currentFile) {
    document.getElementById("preview").innerHTML =
      `<img src="${URL.createObjectURL(currentFile)}">`;
  }
});

document.getElementById("btn").addEventListener("click", async () => {

  if (isProcessing) return;
  isProcessing = true;

  try {
    if (!currentFile) {
      alert("请选择图片");
      return;
    }

    const res = await fetch("/api/analyze", {
      method: "POST",
      body: currentFile
    });

    const data = await res.json();

    document.getElementById("result").innerText =
      JSON.stringify(data, null, 2);

    await UserStore.init();

  } catch (e) {
    alert("识别失败");
  } finally {
    isProcessing = false;
  }
});

//////////////////////////////////////////////////
// ✅ 初始化
//////////////////////////////////////////////////

document.addEventListener("DOMContentLoaded", () => {
  UserStore.init();
});

</script>

<footer class="footer">
  DRTE HerbAI™ · AI 中药识别
</footer>

</body>
</html>
