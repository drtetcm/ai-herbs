<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>DRTE HerbAI</title>

<link rel="icon" href="https://d1yei2z3i6k35z.cloudfront.net/thumb_150/699aeed15c77a_DRTE_favicon.png">

<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<style>
body {
  font-family: Arial;
  padding:20px;
  text-align:center;
}

/* loading */
.spinner {
  width: 36px;
  height: 36px;
  border: 4px solid #eee;
  border-top: 4px solid #0f766e;
  border-radius: 50%;
  margin: 0 auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.card {
  text-align:left;
  max-width:600px;
  margin:20px auto;
}

.progress {
  background:#eee;
  height:8px;
  border-radius:5px;
}

.bar {
  height:8px;
  border-radius:5px;
}
</style>
</head>

<body>

<h2>DRTE HerbAI™</h2>

<input type="file" id="file">
<br>
<button onclick="analyze()" id="btn">开始检测</button>

<!-- ✅ loading -->
<div id="loadingBox" style="display:none;margin-top:15px;">
  <div class="spinner"></div>
  <div id="loadingText" style="margin-top:8px;color:#666;font-size:13px;">
    正在分析图片...
  </div>
</div>

<!-- 报告 -->
<div id="report"></div>

<script>

async function analyze(){

  const btn = document.getElementById("btn");
  const loadingBox = document.getElementById("loadingBox");
  const loadingText = document.getElementById("loadingText");
  const report = document.getElementById("report");

  btn.disabled = true;
  loadingBox.style.display = "block";

  const steps = [
    "正在分析图片...",
    "正在识别药材特征...",
    "正在匹配数据库...",
    "生成检测报告中..."
  ];

  let i = 0;

  const timer = setInterval(()=>{
    loadingText.innerText = steps[i % steps.length];
    i++;
  },1200);

  // 👉 模拟API延迟（你后面换真实API）
  await new Promise(r => setTimeout(r, 2500));

  clearInterval(timer);
  loadingBox.style.display = "none";

  // ===== 模拟数据 =====
  const d = {
    name: "人参",
    confidence: 0.96,
    features: {
      shape: "条状",
      color: "浅黄",
      texture: "坚实",
      size: "中等"
    },
    quality: {
      is_normal: true,
      problems: [],
      reason: "整体符合优质人参特征"
    }
  };

  const score = Math.round(d.confidence * 100);
  const level = score > 85 ? "优质" : score > 60 ? "一般" : "较差";
  const color = score > 85 ? "green" : score > 60 ? "orange" : "red";

  // ✅ 保持你原有结构（只用 innerHTML）
  report.innerHTML = `
    <div class="card">

      <p style="font-size:12px;color:#666;">
        报告编号：DRTE-${Date.now()}
      </p>

      <p style="font-size:12px;color:#666;">
        检测日期：${new Date().toLocaleDateString()}
      </p>

      <h2>📋 中药材检测报告</h2>

      <h3>📌 药材名称：${d.name}</h3>
      <p>置信度：<b>${(d.confidence * 100).toFixed(1)}%</b></p>

      <p>质量评分：<b>${score}</b>（${level}）</p>

      <div class="progress">
        <div class="bar" style="width:${score}%;background:${color}"></div>
      </div>

      <div style="
        padding:10px;
        border-radius:8px;
        background:${d.quality.is_normal ? "#e6ffed" : "#ffe6e6"};
        margin-top:10px;
      ">
        <b style="color:${d.quality.is_normal ? "green" : "red"};">
          ${d.quality.is_normal ? "✔ 正常药材" : "⚠ 存在风险"}
        </b>
      </div>

      <h3>🔍 特征分析</h3>
      <ul>
        <li>形状：${d.features.shape}</li>
        <li>颜色：${d.features.color}</li>
        <li>质地：${d.features.texture}</li>
        <li>大小：${d.features.size}</li>
      </ul>

      ${
        d.quality.problems.length > 0
        ? `<h3>⚠ 问题</h3><ul>${d.quality.problems.map(p=>`<li>${p}</li>`).join("")}</ul>`
        : ""
      }

      <h3>📄 AI分析说明</h3>
      <p>${d.quality.reason}</p>

      <h3>💡 使用建议</h3>
      <p>
        ${d.quality.is_normal
          ? "该药材可正常使用"
          : "建议谨慎使用"}
      </p>

      <button onclick="downloadPDF()">📄 下载PDF报告</button>
      <button onclick="location.reload()" style="background:#6b7280;">🔄 重新识别</button>

      <div style="margin-top:10px;font-size:12px;color:#999;">
        ⚠ AI结果仅供参考
      </div>

    </div>
  `;

  btn.disabled = false;
}


// PDF（保持你原逻辑）
async function downloadPDF(){
  const element = document.getElementById("report");

  const canvas = await html2canvas(element, {
    scale:2,
    useCORS:true
  });

  const img = canvas.toDataURL("image/png");

  const pdf = new jspdf.jsPDF();
  pdf.addImage(img, "PNG", 10, 10, 190, 0);
  pdf.save("DRTE-report.pdf");
}

</script>

</body>
</html>
