<script>

//////////////////////////////////////////////////
// ✅ 全局唯一用户状态（核心重构）
//////////////////////////////////////////////////

const UserStore = {
  data: {
    isPro: false,
    remaining: 0,
    allowed: true,
    credits: 0
  },

  async init() {
    try {
      const token = localStorage.getItem("token");

      if (!token) {
        console.warn("⚠️ 无 token，使用默认用户");
        this.setSafe({});
        return;
      }

      const res = await fetch("/api/user", {
        headers: { Authorization: "Bearer " + token }
      });

      if (!res.ok) {
        this.setSafe({});
        return;
      }

      const data = await res.json();
      this.setSafe(data);

    } catch (e) {
      console.warn("⚠️ initUser失败", e);
      this.setSafe({});
    }
  },

  setSafe(data) {
    this.data = {
      isPro: data?.isPro ?? false,
      remaining: data?.remaining ?? 0,
      allowed: data?.allowed ?? true,
      credits: data?.credits ?? 0
    };

    this.updateUI();
  },

  updateUI() {
    updateUsageUI(this.data);
    updateButtonUI(this.data);
  }
};

//////////////////////////////////////////////////
// ✅ UI 更新（稳定版）
//////////////////////////////////////////////////

function updateUsageUI(user) {
  const el = document.getElementById("usageText");
  if (!el) return;

  if (!user) {
    el.innerText = "⏳ 加载中...";
    return;
  }

  if (user.isPro) {
    el.innerHTML = "👑 Pro会员｜无限使用";
  } else {
    el.innerHTML = `🆓 今日剩余：${user.remaining ?? 0} 次`;
  }
}

function updateButtonUI(user) {
  const btn = document.getElementById("btn");
  if (!btn) return;

  if (!user) {
    btn.disabled = true;
    btn.innerText = "加载中...";
    return;
  }

  if (!user.allowed && !user.isPro) {
    btn.disabled = true;
    btn.innerText = "⚠️ 次数已用完";
    return;
  }

  btn.disabled = false;
  btn.innerText = user.isPro ? "🚀 无限识别中" : "开始识别";
}

//////////////////////////////////////////////////
// ✅ Usage API（统一返回结构）
//////////////////////////////////////////////////

async function getUsageData() {
  try {
    const res = await fetch("/api/usage", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        userId: getUserId()
      })
    });

    const text = await res.text();

    let data = {};
    try {
      data = JSON.parse(text);
    } catch {}

    return {
      allowed: data?.allowed ?? true,
      isPro: data?.isPro ?? false,
      remaining: data?.remaining ?? 0
    };

  } catch {
    return { allowed: true, isPro: false, remaining: 0 };
  }
}

//////////////////////////////////////////////////
// ✅ 按钮逻辑（唯一绑定，彻底修复重复绑定问题）
//////////////////////////////////////////////////

const btn = document.getElementById("btn");

btn.addEventListener("click", handleClick);

let isProcessing = false;
let currentFile = null;

async function handleClick() {

  if (isProcessing) return;
  isProcessing = true;

  try {
    if (!currentFile) {
      alert("请选择图片");
      return;
    }

    const user = UserStore.data;

    // 👉 统一 usage 判断
    let usage = user;

    if (!user.isPro && user.credits <= 0) {
      usage = await getUsageData();
    }

    if (!usage.allowed && !user.isPro && user.credits <= 0) {
      showUpgradeModal();
      return;
    }

    // 👉 UI loading
    btn.disabled = true;

    const base64 = await compress(currentFile);

    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        imageBase64: base64.split(",")[1],
        mediaType: "image/jpeg"
      })
    });

    const text = await res.text();

    let data = {};
    try {
      data = JSON.parse(text);
    } catch {
      throw new Error("返回格式错误");
    }

    if (!data.success) throw new Error(data.error);

    render(data.data);

    // 👉 刷新用户状态（关键）
    await UserStore.init();

  } catch (err) {
    console.error(err);
    alert(err.message);
  } finally {
    isProcessing = false;
    updateButtonUI(UserStore.data);
  }
}

//////////////////////////////////////////////////
// ✅ 文件监听（保留）
//////////////////////////////////////////////////

const fileInput = document.getElementById("file");
const preview = document.getElementById("preview");

fileInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  currentFile = file;
  preview.innerHTML = `<img src="${URL.createObjectURL(file)}" />`;
});

//////////////////////////////////////////////////
// ✅ 初始化（唯一入口）
//////////////////////////////////////////////////

document.addEventListener("DOMContentLoaded", async () => {
  console.log("🚀 App Init");

  await UserStore.init();

  // 👉 定时刷新（但不会覆盖状态结构）
  setInterval(() => {
    UserStore.init();
  }, 10000);
});

//////////////////////////////////////////////////
// ✅ 工具函数（保留）
//////////////////////////////////////////////////

function getUserId() {
  let id = localStorage.getItem("user_id");
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("user_id", id);
  }
  return id;
}

</script>
