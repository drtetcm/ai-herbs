<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DRTE HerbAI™</title>

<style>
body { font-family: Arial; text-align: center; padding: 20px; }
button { padding: 10px 20px; font-size: 16px; }
button:disabled { background: #aaa; }
img { max-width: 300px; margin-top: 10px; }

/* 🔥 弹窗样式 */
#upgradeModal {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
  z-index:999;
}
#upgradeModal .box {
  background:#fff;
  padding:24px;
  border-radius:12px;
  width:280px;
  text-align:center;
}
</style>
</head>

<body>

<h1>DRTE HerbAI™</h1>
<h2>📸 AI 中药识别</h2>

<input type="file" id="file" accept="image/*"><br><br>

<button id="btn">开始识别</button>

<div id="usageText"></div>
<div id="preview"></div>
<pre id="result"></pre>

<!-- 🔥 升级弹窗 -->
<div id="upgradeModal">
  <div class="box">
    <h3>🚀 升级 Pro</h3>
    <p>今日次数已用完</p>
    <p><b>¥9.9 / 月</b></p>

    <button id="upgradeBtn" style="width:100%;margin-top:10px;">
      立即升级
    </button>

    <button onclick="hideUpgradeModal()" style="margin-top:10px;background:#eee;color:#333;">
      取消
    </button>
  </div>
</div>

<script>
//////////////////////////////////////////////////
// 用户状态
//////////////////////////////////////////////////

const UserStore = {
  state: { isPro: false, remaining: 0, allowed: true, credits: 0 },

  async init() {
    try {
      const token = localStorage.getItem("token");

      const res = await fetch("/api/user", {
        headers: { Authorization: "Bearer " + token }
      });

      const data = await res.json();

      this.state = {
        isPro: data?.isPro ?? false,
        remaining: data?.remaining ?? 0,
        allowed: data?.allowed ?? true,
        credits: data?.credits ?? 0
      };

    } catch {
      this.state = { isPro: false, remaining: 0, allowed: true, credits: 0 };
    }

    updateUI();
  }
};

//////////////////////////////////////////////////
// UI
//////////////////////////////////////////////////

function updateUI() {
  const u = UserStore.state;

  const box = document.getElementById("usageText");
  if (box) {
    box.innerText = u.isPro
      ? "👑 Pro会员（无限使用）"
      : `⚡ 剩余 ${u.remaining} 次`;
  }

  const btn = document.getElementById("btn");
  if (btn) {
    btn.disabled = !u.allowed && !u.isPro;
  }
}

//////////////////////////////////////////////////
// 弹窗控制
//////////////////////////////////////////////////

function showUpgradeModal() {
  document.getElementById("upgradeModal").style.display = "flex";
}

function hideUpgradeModal() {
  document.getElementById("upgradeModal").style.display = "none";
}

//////////////////////////////////////////////////
// 用户ID
//////////////////////////////////////////////////

function getUserId() {
  let id = localStorage.getItem("user_id");
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("user_id", id);
  }
  return id;
}

//////////////////////////////////////////////////
// 文件选择
//////////////////////////////////////////////////

let currentFile = null;

document.getElementById("file").addEventListener("change", (e) => {
  currentFile = e.target.files[0];

  if (currentFile) {
    document.getElementById("preview").innerHTML =
      `<img src="${URL.createObjectURL(currentFile)}">`;
  }
});

//////////////////////////////////////////////////
// 点击识别
//////////////////////////////////////////////////

document.getElementById("btn").addEventListener("click", async () => {

  const user = UserStore.state;

  // 🔥 改成弹窗（不再 alert）
  if (!user.isPro && user.remaining <= 0) {
    showUpgradeModal();
    return;
  }

  if (!currentFile) {
    alert("请选择图片");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function () {
    try {
      const base64 = reader.result.split(",")[1];

      const res = await fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          imageBase64: base64,
          mediaType: currentFile.type
        })
      });

      const data = await res.json();

      // 扣次数
      await fetch("/api/increment", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          userId: getUserId()
        })
      });

      document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);

      await UserStore.init();

    } catch (err) {
      console.error(err);
      alert("识别失败");
    }
  };

  reader.readAsDataURL(currentFile);
});

//////////////////////////////////////////////////
// 支付按钮
//////////////////////////////////////////////////

document.getElementById("upgradeBtn").addEventListener("click", async () => {
  try {
    const res = await fetch("/api/stripe-exec", {
      method: "POST"
    });

    const data = await res.json();

    window.location.href = data.url;

  } catch {
    alert("支付失败");
  }
});

//////////////////////////////////////////////////
// 初始化
//////////////////////////////////////////////////

document.addEventListener("DOMContentLoaded", () => {
  UserStore.init();
});
</script>

</body>
</html>
