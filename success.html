<!DOCTYPE html>
<html>
<head>
  <title>支付成功</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body style="
  text-align:center;
  padding:60px;
  font-family:sans-serif;
">

  <h2>✅ 支付成功</h2>
  <p id="status">正在同步会员状态...</p>

  <script>
    (function () {
      try {
        console.log("🎉 支付成功页面");

        // ===== ❗不再写任何会员数据 =====
        // 会员由 webhook + KV 控制

        // ===== 清理旧数据（关键）=====
        localStorage.removeItem("execExpire");
        localStorage.removeItem("userPlan");

        console.log("🧹 已清理旧会员缓存");

        // ===== 提示 =====
        document.getElementById("status").innerText =
          "会员已激活，正在返回首页...";

        // ===== 强制刷新（关键）=====
        setTimeout(() => {
          window.location.href = "/";
        }, 1200);

      } catch (e) {
        console.error("❌ 页面异常:", e);
        document.getElementById("status").innerText =
          "状态同步失败，请刷新页面";
      }
    })();
  </script>

</body>
</html>
